services:

  db:
    image: mariadb:10.6
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./db_dump.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      retries: 10
      start_period: 30s

  backend:
    build: ./backend
    restart: always
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG:-0}
      PYTHONUNBUFFERED: "1"
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
    volumes:
      - ./backend/media:/app/media
      - arxiv_data:/app/arxiv
    depends_on:
      db:
        condition: service_healthy

  bot:
    build: ./backend
    restart: always
    command: python -u -m apps.bot.bot
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG:-0}
      PYTHONUNBUFFERED: "1"
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
    volumes:
      - ./backend/media:/app/media
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  db_data:
  arxiv_data:
